<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FreshFlow Loading Motion</title>
    <style>
      :root {
        --green-500: #0a9a5d;
        --green-400: #33be5d;
        --green-300: #7ce96a;
        --orange-500: #f5841f;
        --bg-a: #f7fff8;
        --bg-b: #dff6e8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(145deg, var(--bg-a), var(--bg-b));
        font-family: Inter, Arial, sans-serif;
      }

      .stage {
        width: min(92vw, 520px);
        padding: 42px 24px;
        border-radius: 28px;
        background: #ffffff;
        box-shadow: 0 16px 40px rgba(8, 77, 46, 0.14);
        text-align: center;
      }

      .track {
        width: 100%;
        height: 16px;
        margin: 26px 0 16px;
        border-radius: 999px;
        background: #e8f5ec;
        overflow: hidden;
        position: relative;
      }

      .progress {
        width: 40%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--green-400), var(--green-500));
        animation: progress 2.8s ease-in-out infinite;
      }

      .cart {
        width: 140px;
        margin-inline: auto;
        animation: glide 2.8s ease-in-out infinite;
        transform-origin: 50% 80%;
      }

      .veg {
        animation: pop 1.4s ease-in-out infinite;
      }

      .veg.two {
        animation-delay: 0.18s;
      }

      .veg.three {
        animation-delay: 0.32s;
      }

      h1 {
        margin: 10px 0 8px;
        font-size: 30px;
        color: #17472f;
        font-weight: 800;
      }

      p {
        margin: 0;
        color: #4b6b5a;
        font-size: 15px;
      }

      @keyframes glide {
        0%, 100% { transform: translateX(-34px) rotate(-1deg); }
        50% { transform: translateX(34px) rotate(1deg); }
      }

      @keyframes pop {
        0%, 100% { transform: translateY(0) scale(1); }
        40% { transform: translateY(-8px) scale(1.08); }
      }

      @keyframes progress {
        0% { transform: translateX(-96%); }
        100% { transform: translateX(250%); }
      }
    </style>
  </head>
  <body>
    <main class="stage">
      <svg class="cart" viewBox="0 0 170 120" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <g class="veg">
          <ellipse cx="63" cy="32" rx="12" ry="9" fill="#EF624B"/>
        </g>
        <g class="veg two">
          <ellipse cx="89" cy="30" rx="12" ry="9" fill="#F7A129"/>
        </g>
        <g class="veg three">
          <ellipse cx="113" cy="25" rx="9" ry="7" fill="#86D95D"/>
        </g>
        <path d="M18 48H148L138 90H42L34 60H18" stroke="#0A9A5D" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M24 103C56 90 84 90 122 102" stroke="#0A9A5D" stroke-width="7" stroke-linecap="round"/>
        <circle cx="52" cy="106" r="6" fill="#0A9A5D"/>
        <circle cx="106" cy="106" r="6" fill="#0A9A5D"/>
      </svg>
      <h1>FreshFlow</h1>
      <p>Smart Grocery, Smarter Life</p>
      <div class="track"><div class="progress"></div></div>
    </main>
  </body>
</html>
